name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      # Smoke-test the CLI binary under both runtimes — catches shebang /
      # bundling regressions that make the published bin unrunnable.
      - run: node dist/cli.js --help
      - run: bun dist/cli.js --help
      # dist/index.js must be plain JS (no raw JSX) parseable by any bundler
      - run: bunx esbuild dist/index.js --bundle --outfile=/dev/null --external:solid-js --external:solid-js/web --format=esm
      - run: bun run test
      - run: bunx tsc --noEmit
